version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Check node & npm versions..."
      - node -v
      - npm -v
      - echo "Installing  dependencies..."
      - npm ci --legacy-peer-deps

  build:
    commands:
      - echo "Building the project..."
      - npm run build
artifacts:
    files:
      - '**/*'
    base-directory: build
    discard-paths: no